"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$cpp\
$golang\
$lua\
$nodejs\
$python\
$rust\
$cmd_duration\
$line_break\
$character\
"""

[directory]
truncation_length = 3
truncation_symbol = "ÔÇĞ/"
style = "fg:#5C9CF5"
format = "[ $path ]($style)"

[character]
success_symbol ='[ÔØ»](fg:#5C9CF5)'
error_symbol = '[ÔØ»](red)'
vimcmd_symbol = '[ÔØ»](fg:#5C9CF5)'

[git_branch]
symbol = "´Éİ"
style = "fg:#5C9CF5"
format = "| [$symbol]($style) $branch"

[git_status]
conflicted = "X"
untracked = "?"
modified = "~"
staged = "+"
renamed = "R"
deleted = "-"
stashed = "Ôëí"
style = "fg:#5C9CF5"
format = " ($conflicted$untracked$modified$staged$renamed$deleted)($ahead_behind$stashed) "

[cmd_duration]
style = "yellow"
format = "| [$duration]($style)"

[python]
symbol = "¯êÁ "
